<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#050505" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="description"
      content="Premium wellness essentials from ZXG Wellness, including creatine, recovery care, reusable pens, cartridges, and accessories."
    />
    <meta name="robots" content="index,follow" />
    <title>ZXG Wellness — Luxury Wellness Atelier</title>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("zxg-theme");
          const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          const theme =
            storedTheme === "light" || storedTheme === "dark" ? storedTheme : systemTheme;

          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
